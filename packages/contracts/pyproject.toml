[project]
name = "credit-desk-contracts"
version = "0.1.0"
description = "Shared schemas and contracts for the credit desk workspace."
readme = "README.md"
requires-python = ">=3.13,<3.15"
dependencies = ["pydantic>=2.9,<3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/credit_desk_contracts"]
