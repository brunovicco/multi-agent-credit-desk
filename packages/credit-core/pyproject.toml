[project]
name = "credit-core"
version = "0.1.0"
description = "Deterministic credit scoring and policy core. No runtime dependencies, no LLM, A2A, MCP, or HTTP imports."
readme = "README.md"
requires-python = ">=3.13,<3.15"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/credit_core"]
