name: quality

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Validate lock file
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen --all-groups --all-packages

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Architecture dependencies
        run: uv run python scripts/validate_architecture.py

      - name: MCP configuration
        run: uv run python scripts/validate_mcp_config.py

      - name: Mypy
        run: uv run mypy packages tests

      - name: Tests
        run: uv run pytest --cov-report=xml

      - name: Bandit
        run: uv run bandit -c pyproject.toml -r packages

      - name: Dependency audit
        run: uv run pip-audit
