# Same pipeline as collector.yaml, plus a Datadog exporter fanning out the same traces (ADR-0006).
# Opt-in only: select this file via OTEL_COLLECTOR_CONFIG=collector.datadog.yaml and set
# DD_API_KEY/DD_SITE — never enabled by default since most evaluators have no Datadog account.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

extensions:
  basicauth/langfuse:
    client_auth:
      username: ${env:LANGFUSE_PUBLIC_KEY}
      password: ${env:LANGFUSE_SECRET_KEY}

exporters:
  otlp_http/langfuse:
    traces_endpoint: ${env:LANGFUSE_OTLP_ENDPOINT}
    auth:
      authenticator: basicauth/langfuse
    headers:
      x-langfuse-ingestion-version: "4"
  datadog:
    api:
      key: ${env:DD_API_KEY}
      site: ${env:DD_SITE}

service:
  extensions: [basicauth/langfuse]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/langfuse, datadog]
